<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro</title>
    <!-- Fonte para o ícone material symbols (Google) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <!-- Link para o arquivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho com logo -->
    <header>
        <img src="logo-metanoia.png" alt="Logo Metanóia">
    </header>

    <!-- Área principal com o formulário -->
    <main>
        <h1>Cadastro de Candidatos</h1>

        <!-- Formulário para inserção de dados -->
        <form id="formCandidato">
          <!-- Container para posicionar o botão de upload no canto direito -->
          <section class="upload-container">
            <!-- Input de arquivo oculto -->
            <input type="file" name="dadosCandidato" id="dadosCandidato" accept=".csv, text/csv, .json, application/json, .txt" hidden />
            
            <!-- Ícone de adicionar (abre o seletor de arquivos) -->
            <label for="dadosCandidato" class="icon-upload" title="Importar Arquivo">
              <span class="material-symbols-outlined">add</span>
            </label>
          </section>

            <!-- Nome completo -->
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required />

            <!-- CPF -->
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required />

            <!-- Campo para selecionar ou digitar o cargo -->
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" name="cargo" placeholder="Digite ou selecione um cargo" list="listaCargos" required/>
                <datalist id="listaCargos">
                    <option value=""></option>
                </datalist>

            <!-- Tipo de Exame -->
            <label for="tipoExame">Tipo de Exame</label>
            <select id="tipoExame" name="tipoExame" required>
                <option value="" selected disabled>---- Escolha uma opção ----</option>
                <option value="Admissional">Admissional</option>
                <option value="Demissional">Demissional</option>
            </select>

            <!-- Data de Exame -->
            <label for="dataExame">Data de Exame</label>
            <input type="date" id="dataExame" name="dataExame" required />

            <!-- Nome da Empresa -->
            <label for="empresa">Empresa</label>
            <input type="text" id="empresa" name="empresa" placeholder="Digite ou selecione uma Empresa" list="listaEmpresa" required/>
                <datalist id="listaEmpresa">
                    <option value="Metanóia Engenharia e Tecnologia"></option>
                    <option value=""></option>
                </datalist>

            <!-- CNPJ da Empresa -->
            <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="Digite ou selecione um CNPJ" list="listaCnpj" required/>
                <datalist id="listaCnpj">
                    <option value="35.121.384/0001-85"></option>
                    <option value=""></option>
                </datalist>

            <!-- Botão para adicionar Candidato -->
            <button type="submit" id="btnAdicionar">Adicionar Candidato</button>

            <!-- Tipo de arquivo que será exportado -->
            <label for="tipoArquivo">Exportar Dados</label>
            <select id="tipoArquivo" name="tipoArquivo">
                <option value="" selected disabled>---- Escolha uma opção ----</option>
                <option value="todos">Todos (JSON, CSV e SQL)</option>
                <option value="json">JSON</option>
                <option value="csv">CSV</option>
                <option value="sql">SQL</option>
            </select>
        </form>
    </main>

    <!-- Link para o arquivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
